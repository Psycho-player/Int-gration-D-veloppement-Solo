<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Projet Réservations</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <th:block layout:fragment="css"></th:block>
</head>
<body>
<div th:replace="~{fragments/header :: header}">Header</div>

<main class="page">
    <div class="container">
        <div id="notification" layout:fragment="notification">
            <div th:if="${successMessage}" class="alert alert-success">
                <p th:text="${successMessage}">Succès</p>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger">
                <p th:text="${errorMessage}">Erreur</p>
            </div>
        </div>

        <div layout:fragment="content">Contenu principal</div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}">Footer</div>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
